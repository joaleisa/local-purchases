<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Compras – Personas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">💳 Mis Compras</span>
    <div>
      <a href="/index.html"           class="btn btn-sm btn-outline-light me-1">Reporte</a>
      <a href="/purchases.html"       class="btn btn-sm btn-outline-light me-1">Compras</a>
      <a href="/people.html"          class="btn btn-sm btn-light me-1">Personas</a>
      <a href="/payment_methods.html" class="btn btn-sm btn-outline-light">Métodos de pago</a>
    </div>
  </div>
</nav>

<div class="container" style="max-width:480px">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Personas</h5>
    <button class="btn btn-primary btn-sm" onclick="openModal()">
      <i class="bi bi-plus-lg me-1"></i>Agregar
    </button>
  </div>

  <div class="card shadow-sm">
    <ul class="list-group list-group-flush" id="list">
      <li class="list-group-item text-muted">Cargando…</li>
    </ul>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="modalTitle">Agregar persona</h6>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label">Nombre *</label>
        <input type="text" class="form-control" id="fName" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary btn-sm" onclick="save()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-body">¿Eliminar a <strong id="deleteName"></strong>?</div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger btn-sm" id="confirmBtn">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let people = [];
let editingId = null;
const modal       = new bootstrap.Modal(document.getElementById('modal'));
const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

async function load() {
  people = await fetch('/api/people').then(r => r.json());
  render();
}

function render() {
  const list = document.getElementById('list');
  if (!people.length) {
    list.innerHTML = '<li class="list-group-item text-muted">Sin personas aún.</li>';
    return;
  }
  list.innerHTML = people.map(p => `
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <span>${p.name}</span>
      <span>
        <button class="btn btn-sm btn-outline-secondary me-1" onclick="openModal(${p.id})">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${p.id}, '${p.name.replace(/'/g,"\\'")}')">
          <i class="bi bi-trash"></i>
        </button>
      </span>
    </li>`).join('');
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'Editar persona' : 'Agregar persona';
  document.getElementById('fName').value = id ? people.find(p => p.id === id).name : '';
  modal.show();
  setTimeout(() => document.getElementById('fName').focus(), 300);
}

async function save() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('Ingresá un nombre.'); return; }
  const url    = editingId ? `/api/people/${editingId}` : '/api/people';
  const method = editingId ? 'PUT' : 'POST';
  const resp   = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });
  if (!resp.ok) { const e = await resp.json(); alert(e.detail || 'Error al guardar.'); return; }
  modal.hide();
  await load();
}

function confirmDelete(id, name) {
  document.getElementById('deleteName').textContent = name;
  document.getElementById('confirmBtn').onclick = async () => {
    const resp = await fetch(`/api/people/${id}`, { method: 'DELETE' });
    if (!resp.ok) { const e = await resp.json(); alert(e.detail || 'Error al eliminar.'); return; }
    deleteModal.hide();
    await load();
  };
  deleteModal.show();
}

load();
</script>
</body>
</html>
