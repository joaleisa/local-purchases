<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Compras – Reporte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    .method-card { margin-bottom: 1.25rem; }
    .summary-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
    .summary-value { font-size: 1.4rem; font-weight: 700; }
  </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">💳 Mis Compras</span>
    <div>
      <a href="/index.html"           class="btn btn-sm btn-light me-1">Reporte</a>
      <a href="/purchases.html"       class="btn btn-sm btn-outline-light me-1">Compras</a>
      <a href="/people.html"          class="btn btn-sm btn-outline-light me-1">Personas</a>
      <a href="/payment_methods.html" class="btn btn-sm btn-outline-light">Métodos de pago</a>
    </div>
  </div>
</nav>

<div class="container pb-5">

  <!-- Month navigation -->
  <div class="d-flex align-items-center justify-content-center gap-3 mb-4">
    <button class="btn btn-outline-secondary" id="prevBtn"><i class="bi bi-chevron-left"></i></button>
    <h3 class="mb-0 text-capitalize" id="monthTitle" style="min-width:220px;text-align:center">–</h3>
    <button class="btn btn-outline-secondary" id="nextBtn"><i class="bi bi-chevron-right"></i></button>
  </div>

  <!-- Summary bar -->
  <div class="row g-3 mb-4" id="summaryRow"></div>

  <!-- Empty state -->
  <div id="emptyState" class="text-center text-muted py-5" style="display:none">
    <i class="bi bi-calendar-x fs-1"></i>
    <p class="mt-2">Sin cuotas este mes.</p>
  </div>

  <!-- People totals section -->
  <div id="peopleTotalsSection" class="mb-4" style="display:none">
    <h5 class="text-secondary border-bottom pb-2 mb-3">
      <i class="bi bi-people me-2"></i>Total que me deben este mes
    </h5>
    <div id="peopleTotalsContent" class="d-flex flex-wrap gap-2"></div>
  </div>

  <!-- Credit cards section -->
  <div id="ccSection">
    <h5 class="text-secondary border-bottom pb-2 mb-3">
      <i class="bi bi-credit-card me-2"></i>Tarjetas de crédito
    </h5>
    <div id="ccContent"></div>
  </div>

  <!-- Person debts section -->
  <div id="pdSection" class="mt-4">
    <h5 class="text-secondary border-bottom pb-2 mb-3">
      <i class="bi bi-person-exclamation me-2"></i>Le debo a…
    </h5>
    <div id="pdContent"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function fmt(n) {
  return '$\u202f' + Number(n).toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

let curMonth, curYear;

function init() {
  const p = new URLSearchParams(location.search);
  const today = new Date();
  curMonth = parseInt(p.get('month')) || today.getMonth() + 1;
  curYear  = parseInt(p.get('year'))  || today.getFullYear();
  load();
}

function navigate(delta) {
  curMonth += delta;
  if (curMonth > 12) { curMonth = 1;  curYear++; }
  if (curMonth < 1)  { curMonth = 12; curYear--; }
  history.pushState({}, '', `?month=${curMonth}&year=${curYear}`);
  load();
}

document.getElementById('prevBtn').onclick = () => navigate(-1);
document.getElementById('nextBtn').onclick = () => navigate(1);

async function load() {
  document.getElementById('monthTitle').textContent = `${MONTHS[curMonth-1]} ${curYear}`;
  const r = await fetch(`/api/report?month=${curMonth}&year=${curYear}`);
  const data = await r.json();

  renderSummary(data.summary);
  renderPeopleTotals(data.people_totals || []);

  const hasCC = data.credit_cards.length > 0;
  const hasPD = data.person_debts.length > 0;

  document.getElementById('emptyState').style.display = (!hasCC && !hasPD) ? '' : 'none';
  document.getElementById('ccSection').style.display  = hasCC ? '' : 'none';
  document.getElementById('pdSection').style.display  = hasPD ? '' : 'none';

  if (hasCC) renderGroups(data.credit_cards, 'ccContent');
  if (hasPD) renderGroups(data.person_debts, 'pdContent');
}

function renderSummary(s) {
  const cards = [
    { label: 'Total tarjetas',  value: s.cards_total,         cls: 'primary' },
    { label: 'Mi parte real',   value: s.my_real_total,       cls: 'success' },
    { label: 'Otros me deben',  value: s.cards_others_owe_me, cls: 'info'    },
    { label: 'Le debo a otros', value: s.debts_total,         cls: 'warning' },
  ];
  document.getElementById('summaryRow').innerHTML = cards.map(c => `
    <div class="col-6 col-md-3">
      <div class="card border-${c.cls} h-100">
        <div class="card-body text-center py-3">
          <div class="summary-label">${c.label}</div>
          <div class="summary-value text-${c.cls}">${fmt(c.value)}</div>
        </div>
      </div>
    </div>`).join('');
}

function renderPeopleTotals(people) {
  const section = document.getElementById('peopleTotalsSection');
  const content = document.getElementById('peopleTotalsContent');
  if (people.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';
  content.innerHTML = people.map(p => `
    <div class="card border-info">
      <div class="card-body text-center px-4 py-3">
        <div class="summary-label">${escapeHtml(p.name)}</div>
        <div class="summary-value text-info">${fmt(p.total)}</div>
      </div>
    </div>`).join('');
}

function renderGroups(groups, containerId) {
  document.getElementById(containerId).innerHTML = groups.map(g => `
    <div class="card method-card shadow-sm">
      <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <strong>${escapeHtml(g.payment_method_name)}</strong>
        <span class="small text-muted">
          Total&nbsp;<strong>${fmt(g.total)}</strong>
          &nbsp;·&nbsp;
          Mío&nbsp;<strong class="text-success">${fmt(g.mine)}</strong>
          &nbsp;·&nbsp;
          Me deben&nbsp;<strong class="text-info">${fmt(g.others_owe_me)}</strong>
        </span>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Descripción</th>
                <th class="text-center">Cuota</th>
                <th class="text-end">Monto cuota</th>
                <th class="text-end">Mi parte</th>
                <th>Me deben</th>
              </tr>
            </thead>
            <tbody>
              ${g.items.map(item => `
              <tr>
                <td>${escapeHtml(item.description)}</td>
                <td class="text-center">${item.installment_number}/${item.num_installments}</td>
                <td class="text-end">${fmt(item.installment_amount)}</td>
                <td class="text-end ${item.owner_amount === 0 ? 'text-muted' : ''}">${fmt(item.owner_amount)}</td>
                <td>
                  ${item.per_participant.length === 0
                    ? `<span class="text-muted small">${item.owner_participates ? 'Solo yo' : '–'}</span>`
                    : item.per_participant.map(p =>
                        `<span class="me-2 text-nowrap">
                           <span class="badge bg-secondary">${escapeHtml(p.name)}</span>
                           <span class="text-info fw-semibold">${fmt(p.amount)}</span>
                         </span>`
                      ).join('')
                  }
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`).join('');
}

init();
</script>
</body>
</html>
